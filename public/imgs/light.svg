<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
        <linearGradient id="g" x1="0%" x2="100%" y1="0%" y2="100%">
            <stop offset="0%" stop-color="#C78BFF"/>
            <stop offset="60%" stop-color="#7FCBFF"/>
            <stop offset="100%" stop-color="#FF8ACC"/>
        </linearGradient>

        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3.2" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Центральный желтый круг -->
    <g filter="url(#glow)">
        <circle cx="24" cy="24" r="9.2" fill="yellow" stroke="url(#g)" stroke-width="1.8" opacity="1" />
    </g>

    <!-- Линии вокруг -->
    <g stroke="url(#g)" stroke-width="1.3" stroke-linecap="round" opacity="1" filter="url(#glow)">
        <line x1="24" y1="9.5" x2="24" y2="6.6" />
        <line x1="24" y1="38.9" x2="24" y2="42.4" />
        <line x1="9.5" y1="24" x2="6.6" y2="24" />
        <line x1="38.9" y1="24" x2="42.4" y2="24" />
        <line x1="11.7" y1="11.7" x2="9.0" y2="9.0" />
        <line x1="36.3" y1="36.3" x2="39.0" y2="39.0" />
    </g>

    <!-- Внутренние формы -->
    <g filter="url(#glow)">
        <path d="M30.2 16.8c-0.9-0.7-2-1.2-3.3-1.3-4.6-0.4-8.4 3.2-8.8 7.8-.3 3.6 1.9 6.7 5.1 7.8 0.9.3 1.8.4 2.7.3 4.7-.6 7.9-5.4 7.3-10.1-.3-2.4-1.4-4.3-3-4.5z"
            fill="yellow" fill-opacity="0.95" />
        <path d="M28.6 18.6c-0.7-0.5-1.6-.9-2.6-1-3.8-.3-6.9 2.6-7.2 6.4-.2 2.9 1.5 5.3 4 6.1 0.7.2 1.5.3 2.1.2 3.9-.5 6.5-4.5 6.1-8.4-.2-2-1.1-3.6-2.4-3.3z"
            fill="url(#g)" fill-opacity="0.2" />
    </g>
</svg>
